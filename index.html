<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Basic Meta Tags -->
    <title>Verinest - Verified Real Estate & Property Listings</title>
    <meta name="description" content="Verinest is a trusted real estate platform connecting verified agents, landlords, and seekers. Buy, rent, or sell properties with confidence through verified profiles and secure transactions." />
    <meta name="author" content="Verinest" />
    <meta name="keywords" content="real estate, property listings, rent, buy, sell, verified agents, landlords, Nigeria, housing, apartments, homes" />
    <meta name="theme-color" content="#C4714A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='12' width='6' height='8' rx='1' fill='%23C4714A'/><path d='M3 12L12 4L21 12' stroke='%23C4714A' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/><rect x='15' y='12' width='6' height='8' rx='1' fill='%23C4714A' opacity='0.6'/></svg>" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Verinest - Verified Real Estate Platform" />
    <meta property="og:description" content="Connect with verified agents, landlords, and property seekers. Buy, rent, or sell with confidence on Verinest." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://verinest.ng" />
    <meta property="og:image" content="https://verinest.ng/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Verinest" />
    <meta property="og:locale" content="en_NG" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@VerinestNG" />
    <meta name="twitter:creator" content="@VerinestNG" />
    <meta name="twitter:title" content="Verinest - Verified Real Estate Platform" />
    <meta name="twitter:description" content="Connect with verified agents, landlords, and property seekers. Buy, rent, or sell with confidence." />
    <meta name="twitter:image" content="https://verinest.ng/twitter-image.png" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "Verinest",
      "description": "Verified real estate platform for buying, renting, and selling properties",
      "url": "https://verinest.ng",
      "sameAs": [
        "https://twitter.com/VerinestNG",
        "https://instagram.com/VerinestNG",
        "https://facebook.com/VerinestNG"
      ],
      "areaServed": "NG",
      "telephone": "+234-XXX-XXX-XXXX"
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Verinest",
      "description": "Verified Real Estate and Property Listings Platform",
      "url": "https://verinest.ng",
      "logo": "https://verinest.ng/logo.png",
      "foundingDate": "2024",
      "areaServed": "NG",
      "sameAs": [
        "https://twitter.com/VerinestNG",
        "https://instagram.com/VerinestNG"
      ]
    }
    </script>
    
    <!-- Additional SEO Tags -->
    <link rel="canonical" href="https://verinest.ng" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="alternate" hreflang="en" href="https://verinest.ng" />
    <link rel="alternate" hreflang="en-NG" href="https://verinest.ng/ng" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
